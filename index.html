  <div style="max-width:900px;margin:0 auto;padding:40px 20px;font-family:sans-serif;color:#111">
    <h1>SoloFly — Система автономного управления БПЛА на базе ИИ</h1>
    <p>SoloFly — экспериментальная система автономного управления беспилотными летательными аппаратами (БПЛА/дронами) на базе искусственного интеллекта, разработанная ООО «МАТ-Лабс». Система разрабатывает алгоритмы адаптивной навигации и автономного принятия решений для промышленного применения. Работает с дронами на Ardupilot и PX4 через протокол MAVLink v2. Данные хранятся в России.</p>

    <h2>Возможности системы управления БПЛА</h2>
    <ul>
      <li>Автономное планирование маршрутов и выполнение миссий без участия оператора</li>
      <li>Алгоритмы адаптивной навигации с учётом рельефа, погоды и запретных зон</li>
      <li>Компьютерное зрение YOLO11 — точность распознавания объектов 97.4%</li>
      <li>Задержка принятия решений ИИ менее 15 мс</li>
      <li>Телеметрия более 300 параметров в реальном времени</li>
      <li>Управление роем БПЛА с координацией нескольких дронов</li>
      <li>Поддержка MAVLink v2, Ardupilot, PX4, Pixhawk, Cube Orange</li>
      <li>Данные хранятся в России, соответствие 152-ФЗ</li>
    </ul>

    <h2>Отраслевые решения — применение БПЛА</h2>

    <h3>Сельское хозяйство — агромониторинг дроном</h3>
    <p>Агрохолдинги и фермерские хозяйства используют БПЛА для анализа состояния посевов, мониторинга здоровья растений по индексу NDVI, создания карт плодородия почв, оптимизации орошения и внесения удобрений, выявления заболеваний и вредителей. Покрытие до 10 000 га за 4 часа.</p>

    <h3>Строительство и инфраструктура — инспекция объектов дроном</h3>
    <p>Строительные компании и девелоперы применяют БПЛА для мониторинга хода строительства, инспекции объектов инфраструктуры, создания 3D-моделей площадок, контроля качества работ, обследования мостов, дорог и тоннелей.</p>

    <h3>Энергетика — инспекция ЛЭП и трубопроводов</h3>
    <p>Электросетевые компании и нефтегазовые предприятия используют дроны для инспекции ЛЭП и подстанций, обнаружения утечек на трубопроводах, осмотра ветрогенераторов и солнечных панелей, тепловизионного контроля оборудования.</p>

    <h3>Логистика — доставка и инвентаризация</h3>
    <p>Логистические компании и маркетплейсы применяют БПЛА для доставки малогабаритных грузов, инвентаризации складов, оптимизации маршрутов, мониторинга логистических центров.</p>

    <h3>Безопасность — патрулирование периметра БПЛА</h3>
    <p>Охранные предприятия используют дроны для патрулирования территорий, обнаружения несанкционированного проникновения, мониторинга периметров, обеспечения безопасности на массовых мероприятиях.</p>

    <h3>МЧС и спецслужбы — поиск и спасение</h3>
    <p>Поисково-спасательные службы и МЧС применяют БПЛА для разведки и наблюдения, поиска пострадавших и пропавших, оценки масштабов ЧС, координации спасательных операций, охраны границ.</p>
